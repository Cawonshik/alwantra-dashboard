<!DOCTYPE html>
<html>
<head>
    <title>ALWANTRA DASHBOARD</title>

    <!-- Futuristic Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- ================= BACKGROUND LAYERS ================= -->
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<!-- ================= HEADER ================= -->
<div class="top-header">

    <div class="logo">
        🚀 ALWANTRA DASHBOARD
    </div>

    {% if current_user.is_authenticated %}

    <div class="nav-wrapper">

        <!-- MENU -->
        <div class="menu">
            <a href="/">AIRDROP</a>
            <a href="/akun">AKUN</a>
            <a href="/address">ADDRESS</a>
        </div>

        <!-- ACTIONS -->
        <div class="top-actions">
            <input id="search" placeholder="search..." onkeyup="search()">
            <a href="/export_airdrop" class="btn">Export CSV</a>
            <a href="/logout" class="btn">Logout</a>
        </div>

    </div>

    {% endif %}

</div>

<!-- ================= MAIN CONTENT ================= -->
<div class="container">

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">
          {% for message in messages %}
            <p>{{ message }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

</div>

<!-- ================= SCRIPT ================= -->
<script>
function search() {
    const input = document.getElementById("search").value.toLowerCase();
    const cards = document.querySelectorAll(".airdrop-card, .wallet-card");

    cards.forEach(card => {
        const match = card.innerText.toLowerCase().includes(input);
        card.style.display = match ? "" : "none";
    });
}

function copy(text){
    navigator.clipboard.writeText(text);
}

function scan(addr){
    window.open("https://etherscan.io/address/" + addr, "_blank");
}
</script>

</body>
</html>
