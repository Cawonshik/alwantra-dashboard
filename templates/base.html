<!DOCTYPE html>
<html>

<head>

<title>ALWANTRA - Crypto Dashboard</title>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="description" content="Alwantra Dashboard adalah platform untuk mengelola airdrop, wallet address, akun, dan automation crypto dalam satu dashboard.">

<meta name="keywords" content="crypto dashboard, airdrop manager, wallet manager, web3 tools">

<meta name="author" content="ALWANTRA">

<meta property="og:title" content="ALWANTRA Dashboard">
<meta property="og:description" content="Platform untuk mengelola airdrop, wallet address, akun, dan automation crypto dalam satu dashboard.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://alwantra.xyz">
<meta property="og:site_name" content="ALWANTRA">

<link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">

<script type="application/ld+json">
{
 "@context": "https://schema.org",
 "@type": "WebSite",
 "name": "ALWANTRA",
 "url": "https://alwantra.xyz"
}
</script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>


<body class="bg-black text-white font-[Orbitron]">


<!-- BACKGROUND -->

<div class="fixed inset-0 bg-[radial-gradient(circle_at_top,#00111f,#000000)] -z-10"></div>



{% if current_user.is_authenticated %}

<header class="border-b border-gray-800 bg-black/70 backdrop-blur">

<div class="max-w-7xl mx-auto px-6 py-4">

<div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">


<!-- LOGO -->

<div class="text-cyan-400 font-bold text-xl">
🚀 ALWANTRA
</div>


<!-- MENU -->

<nav class="flex flex-wrap gap-4 text-sm">

<a href="/" class="hover:text-cyan-400">
AIRDROP
</a>

<a href="/akun" class="hover:text-cyan-400">
AKUN
</a>

<a href="/address" class="hover:text-cyan-400">
ADDRESS
</a>

</nav>


<!-- ACTION -->

<div class="flex flex-wrap items-center gap-3 w-full md:w-auto">

<input
id="search"
placeholder="search..."
onkeyup="search()"
class="bg-black border border-gray-700 rounded-lg px-3 py-1 text-sm w-full md:w-40"
/>

<button
onclick="openSearch()"
class="border border-gray-700 px-3 py-1 rounded-lg hover:border-cyan-400 text-sm">
🔍
</button>

<a href="/export_airdrop"
class="border border-gray-700 px-3 py-1 rounded-lg hover:border-cyan-400 text-sm">
Export
</a>

<a href="/logout"
class="border border-red-500 px-3 py-1 rounded-lg hover:bg-red-500 text-sm">
Logout
</a>

</div>

</div>

</div>

</header>

{% endif %}



<!-- CONTENT -->

<main class="max-w-7xl mx-auto px-6 py-8">

{% with messages = get_flashed_messages() %}
{% if messages %}

<div class="bg-red-900 border border-red-500 p-4 rounded mb-6">

{% for message in messages %}
<p>{{ message }}</p>
{% endfor %}

</div>

{% endif %}
{% endwith %}

{% block content %}{% endblock %}

</main>



<!-- GLOBAL SEARCH -->

<div id="searchOverlay"
class="hidden fixed inset-0 bg-black/80 backdrop-blur z-50 flex items-start justify-center pt-32">

<div class="bg-[#061321] border border-cyan-400/30 w-full max-w-xl rounded-xl p-6 relative">

<button
onclick="closeSearch()"
class="absolute top-3 right-4 text-gray-400 hover:text-white text-lg">
✕
</button>

<input
id="globalSearch"
placeholder="Search Gmail, Twitter, Telegram, Wallet..."
class="w-full bg-black border border-gray-700 px-4 py-3 rounded-lg text-white focus:outline-none"
/>

<div id="searchResults" class="mt-4 flex flex-col gap-2 text-sm"></div>

</div>

</div>



<!-- SCRIPT -->

<script>

function search(){

const input = document.getElementById("search").value.toLowerCase()

const cards = document.querySelectorAll(".airdrop-card, .wallet-card, .account-card")

cards.forEach(card => {

const match = card.innerText.toLowerCase().includes(input)

card.style.display = match ? "" : "none"

})

}


function copy(text){

if(!text) return

navigator.clipboard.writeText(text)

toast("Copied!")

}


function scan(addr){

window.open("https://etherscan.io/address/" + addr, "_blank")

}


/* GLOBAL SEARCH */

function openSearch(){

document.getElementById("searchOverlay").classList.remove("hidden")

document.getElementById("globalSearch").focus()

}

function closeSearch(){

document.getElementById("searchOverlay").classList.add("hidden")

document.getElementById("globalSearch").value=""

document.getElementById("searchResults").innerHTML=""

}


/* CTRL + K */

document.addEventListener("keydown",function(e){

if(e.ctrlKey && e.key==="k"){

e.preventDefault()

openSearch()

}

if(e.key==="Escape"){

closeSearch()

}

})


/* LIVE SEARCH */

document.addEventListener("DOMContentLoaded",()=>{

const input=document.getElementById("globalSearch")

if(!input) return

input.addEventListener("keyup",function(){

let keyword=this.value.toLowerCase()

let cards=document.querySelectorAll(
".account-card, .wallet-card, .airdrop-card"
)

let results=document.getElementById("searchResults")

results.innerHTML=""

cards.forEach(card=>{

let text=card.innerText.toLowerCase()

if(text.includes(keyword) && keyword.length>0){

let item=document.createElement("div")

item.className="border border-gray-700 px-3 py-2 rounded hover:bg-cyan-400/10 cursor-pointer"

item.innerText=card.innerText.slice(0,120)

item.onclick=()=>{

card.scrollIntoView({
behavior:"smooth",
block:"center"
})

closeSearch()

}

results.appendChild(item)

}

})

})

})


/* CLOSE JIKA KLIK BACKGROUND */

document.getElementById("searchOverlay").addEventListener("click",function(e){

if(e.target.id==="searchOverlay"){

closeSearch()

}

})

</script>


</body>
</html>
